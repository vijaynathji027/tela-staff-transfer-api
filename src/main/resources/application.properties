spring.application.name=StaffTransfer

spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect
spring.datasource.driver-class-name=org.postgresql.Driver
spring.profiles.active=${ACTIVE-PROFILE:dev}

spring.datasource.url=${DB-URL:jdbc:postgresql://192.168.3.155:5432/StaffTransferDb}
spring.datasource.username=${DB-USERNAME:postgres}
spring.datasource.password=${DB-PASSWORD:s@dmin5432}

tela.transfer.base.url=${TELA-TRANSFER-BASE-URL:http://172.233.50.62:2059}

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

server.port=${PORT:1409}

spring.datasource.hikari.pool-name=TelaConnPool
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.auto-commit=false
spring.datasource.hikari.minimum-idle=20
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.connection-timeout=60000

#spring.cache.type=redis
#spring.data.redis.database=${REDIS-DATABASE:0}
#spring.data.redis.host=${REDIS-HOST:localhost}
#spring.data.redis.port=${REDIS-PORT:6379}
#spring.cache.redis.cache-null-values=${REDIS-CACHE-NULL:false}
#spring.cache.redis.time-to-live=${REDIS-TTL:1800000}

spring.cache.type=redis
spring.data.redis.database=${redis-database:0}
spring.data.redis.host=${redis-host:192.168.3.155}
spring.data.redis.port=${redis-port:6379}
spring.cache.redis.time-to-live=${redis-ttl:1800000}
spring.cache.redis.cache-null-values=${redis-cache-null:false}

spring.threads.virtual.enabled=true

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui-custom.html


#Log
logging.level.root=info
logging.file.name=logs/system.log
logging.logback.rollingpolicy.max-history=7
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.filter.CommonsRequestLoggingFilter=DEBUG
